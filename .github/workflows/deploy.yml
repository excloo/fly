name: Deploy Fly

on:
  push:
    paths:
      - '**'
  workflow_dispatch:
    inputs:
      path:
        description: 'App to deploy or leave empty for all'
        required: false

jobs:
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed-files.outputs.all_changed_files || steps.manual.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Changed Files
        id: changed-files
        if: github.event_name == 'push'
        uses: tj-actions/changed-files@v47
        with:
          dir_names: true
          dir_names_max_depth: 1
          dir_names_exclude_current_dir: true
          files_ignore: '.*/**'
          matrix: true
      - name: Manual Files
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "${{ inputs.path }}" ]; then
            echo "matrix=[\"${{ inputs.path }}\"]" >> $GITHUB_OUTPUT
          else
            DIRS=$(find . -maxdepth 1 -mindepth 1 -type d ! -name '.*' -printf '"%f",' | sed 's/,$//')
            echo "matrix=[$DIRS]" >> $GITHUB_OUTPUT
          fi

  deploy:
    if: needs.changed-files.outputs.matrix != '[]'
    needs: [changed-files]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changed-files.outputs.matrix) }}
    env:
      APP: ${{ matrix.app }}
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      SOPS_AGE_KEY: ${{ secrets.AGE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@1.5
      - name: Setup SOPS
        uses: nhedger/setup-sops@v2
      - name: Decrypt Files
        run: find "$APP" -type f | xargs grep -l 'sops:' | xargs -r sops --decrypt --in-place
      - name: Deploy
        run: flyctl deploy --app "$APP" --config "$APP/fly.toml" > /dev/null
